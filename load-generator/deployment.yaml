apiVersion: apps/v1
kind: Deployment
metadata:
  name: yolo-load-generator
  labels:
    app: yolo-load
spec:
  # START WITH 1, SCALE UP TO SATURATE GPU
  replicas: 1
  selector:
    matchLabels:
      app: yolo-load
  template:
    metadata:
      labels:
        app: yolo-load
    spec:
      containers:
      - name: load-generator
        image: hamidhrf/yolo-load-generator:v1
        
        env:
        # Adjust workers per pod to control load
        - name: WORKERS
          value: "4"
        
        command: ["python", "load-client.py"]
        args:
          - "--api-url=http://yolo-api:8080"
          - "--workers=$(WORKERS)"
          # Run forever (no --duration)
        
        # No resource limits - load generator is lightweight
        # Uses ~100MB RAM and minimal CPU per pod
