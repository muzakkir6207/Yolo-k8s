apiVersion: apps/v1
kind: Deployment
metadata:
  name: yolo-load-generator
  namespace: yolo1
  labels:
    app: yolo-load
spec:
  replicas: 0
  selector:
    matchLabels:
      app: yolo-load
  template:
    metadata:
      labels:
        app: yolo-load
    spec:
      containers:
      - name: load-generator
        image: muzakkir6207/yolo-load-generator:v1
        imagePullPolicy: IfNotPresent
        env:
        - name: WORKERS
          value: "8"
        - name: IMAGE_SIZE
          value: "1280"
        - name: API_URL
          value: http://yolo-api.yolo1.svc.cluster.local:8080
        command: ["python", "/workspace/load-generator/load-client.py"]
        args:
          - "--api-url=$(API_URL)"
          - "--workers=$(WORKERS)"
          - "--image-size=$(IMAGE_SIZE)"
        volumeMounts:
        - name: load-generator-src
          mountPath: /workspace/load-generator
          readOnly: true
        # Continuous mode is available, but disabled by default via replicas: 0.
        resources: {}
      volumes:
      - name: load-generator-src
        hostPath:
          path: /home/user/Yolo-k8s/load-generator
          type: Directory
